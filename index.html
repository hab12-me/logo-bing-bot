<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Logo Bing Bingo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            color: #ffffff;
            min-height: 100vh;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
            overflow-x: hidden;
        }

        .container {
            max-width: 100%;
            padding: 8px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 8px;
        }

        .logo {
            font-size: 20px;
            font-weight: 800;
            background: linear-gradient(135deg, #00d4ff, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Stats Row */
        .stats-row {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }

        .stat-card {
            flex: 1;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 8px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stat-label {
            font-size: 9px;
            color: #aaaaaa;
            margin-bottom: 2px;
        }

        .stat-value {
            font-size: 16px;
            font-weight: bold;
            color: #00d4ff;
        }

        /* Section */
        .section {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border-radius: 14px;
            padding: 10px;
            margin-bottom: 10px;
        }

        .section-title {
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #aaaaaa;
        }

        /* Cards Grid - 5 columns for mobile */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
            max-height: 200px;
            overflow-y: auto;
        }

        .card-btn {
            aspect-ratio: 1;
            background: linear-gradient(135deg, #4a4e69, #22223b);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .card-btn:active {
            transform: scale(0.95);
        }

        .card-btn.owned {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            opacity: 0.9;
            cursor: default;
        }

        /* Preview Grid */
        .preview-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 4px;
            background: rgba(0, 0, 0, 0.4);
            padding: 8px;
            border-radius: 12px;
            margin-bottom: 8px;
        }

        .preview-cell {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            font-size: 11px;
            font-weight: bold;
        }

        .preview-free {
            background: #2ecc71;
            color: white;
        }

        /* Buttons */
        .btn {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-primary {
            background: #2ecc71;
            color: white;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }

        /* Countdown */
        .countdown {
            text-align: center;
            padding: 10px;
            background: linear-gradient(135deg, rgba(46, 204, 113, 0.2), rgba(46, 204, 113, 0.05));
            border-radius: 16px;
            margin-top: 10px;
        }

        .countdown-number {
            font-size: 32px;
            font-weight: bold;
            color: #2ecc71;
        }

        /* Game Layout - Side by Side */
        .game-layout {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .game-board {
            flex: 1;
            min-width: 140px;
        }

        .game-sidebar {
            flex: 1;
            min-width: 140px;
        }

        /* Master Board */
        .master-board {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 8px;
        }

        .master-header {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 3px;
            margin-bottom: 6px;
        }

        .master-header span {
            text-align: center;
            padding: 4px;
            font-size: 10px;
            font-weight: bold;
            border-radius: 6px;
        }

        .header-b { background: #2ecc71; }
        .header-i { background: #f39c12; }
        .header-n { background: #3498db; }
        .header-g { background: #e74c3c; }
        .header-o { background: #9b59b6; }

        .master-grid {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .master-row {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 3px;
        }

        .master-cell {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 5px;
            font-size: 8px;
            font-weight: bold;
        }

        .master-cell.called {
            background: #2ecc71;
            color: #000;
        }

        /* Game Sidebar */
        .game-sidebar-inner {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 8px;
        }

        .current-call {
            text-align: center;
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 8px;
            border-radius: 12px;
            margin-bottom: 8px;
        }

        .call-ball {
            width: 50px;
            height: 50px;
            background: #f39c12;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
            margin-top: 4px;
        }

        /* History */
        .history {
            display: flex;
            gap: 5px;
            justify-content: center;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }

        .history-ball {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 8px;
            font-weight: bold;
        }

        .ball-b { background: #2ecc71; }
        .ball-i { background: #f39c12; }
        .ball-n { background: #3498db; }
        .ball-g { background: #e74c3c; }
        .ball-o { background: #9b59b6; }

        /* Player Cards */
        .player-cards-scroll {
            max-height: 180px;
            overflow-y: auto;
        }

        .player-card {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 10px;
            padding: 6px;
            margin-bottom: 6px;
        }

        .player-card-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 2px;
        }

        .player-cell {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.12);
            border-radius: 5px;
            font-size: 9px;
            font-weight: bold;
        }

        .player-cell.marked {
            background: #2ecc71;
            color: #000;
        }

        .player-cell.free {
            background: #f39c12;
            color: white;
        }

        /* Bingo Button */
        .bingo-btn {
            width: 100%;
            padding: 10px;
            font-size: 14px;
            font-weight: bold;
            background: linear-gradient(135deg, #f39c12, #e67e22);
            border: none;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            margin-top: 8px;
        }

        /* Popup */
        .popup {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 12px;
            z-index: 1000;
            display: none;
            white-space: nowrap;
        }

        /* Modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .modal-content {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-radius: 24px;
            padding: 20px;
            text-align: center;
            margin: 20px;
            max-width: 260px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .modal-content h2 {
            font-size: 32px;
            margin-bottom: 10px;
            color: #ffeb3b;
        }

        .hidden {
            display: none !important;
        }

        ::-webkit-scrollbar {
            width: 3px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">🎯 LOGO BING</div>
        </div>

        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-label">💰 BALANCE</div>
                <div class="stat-value" id="balance">0 ETB</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">🎮 CARDS</div>
                <div class="stat-value" id="cardCount">0</div>
            </div>
        </div>

        <div id="lobbyView">
            <div class="section">
                <div class="section-title">🎴 TAP A CARD TO BUY (MAX 2, 10 ETB)</div>
                <div class="cards-grid" id="cardsGrid"></div>
            </div>
            
            <div id="myCardsSection" class="section hidden">
                <div class="section-title">🎮 MY CARDS (<span id="myCardsCount">0</span>/2)</div>
                <div id="myCardsList"></div>
                <div class="action-buttons">
                    <button class="btn btn-secondary" id="resetBtn">🔄 RESET</button>
                </div>
            </div>

            <div id="countdownSection" class="countdown hidden">
                <div>⏳ GAME STARTS IN</div>
                <div class="countdown-number" id="countdownTimer">30</div>
            </div>
        </div>

        <div id="gameView" class="hidden">
            <div class="game-layout">
                <div class="game-board">
                    <div class="master-board">
                        <div class="master-header">
                            <span class="header-b">B</span><span class="header-i">I</span><span class="header-n">N</span><span class="header-g">G</span><span class="header-o">O</span>
                        </div>
                        <div class="master-grid" id="masterGrid"></div>
                    </div>
                </div>
                <div class="game-sidebar">
                    <div class="game-sidebar-inner">
                        <div class="current-call">
                            <div style="font-size: 10px;">CURRENT CALL</div>
                            <div class="call-ball" id="currentCall">—</div>
                        </div>
                        <div class="history" id="historyCalls"></div>
                        <div class="player-cards-scroll" id="playerCardsContainer"></div>
                        <button class="bingo-btn" id="bingoBtn">🎯 BINGO! 🎯</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="popup" id="popup"></div>

    <div class="modal" id="winnerModal">
        <div class="modal-content">
            <h2>🎉 BINGO!</h2>
            <p id="winnerMessage"></p>
            <button class="btn btn-primary" id="closeModalBtn">PLAY AGAIN</button>
        </div>
    </div>

    <script>
        // ============================================
        // TELEGRAM WEBAPP INTEGRATION
        // ============================================
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
            tg.enableClosingConfirmation();
        }

        // ============================================
        // BACKEND CONFIGURATION
        // ============================================
        const BACKEND_URL = 'https://logo-bingo-complete-gfdjsdo.onrender.com';
        
        let telegramId = tg?.initDataUnsafe?.user?.id || 'test_' + Math.random();
        let balance = 0;
        let firstName = '';
        let allCards = [];
        let myCards = [];
        let gameActive = false;
        let calledNumbers = [];
        let callInterval = null;
        let countdownInterval = null;
        let countdown = 30;
        let isProcessingBuy = false;

        // ============================================
        // API CALLS
        // ============================================
        
        async function loadUserData() {
            try {
                const response = await fetch(`${BACKEND_URL}/api/user/${telegramId}`);
                const data = await response.json();
                if (data.success) {
                    balance = data.balance;
                    firstName = data.firstName;
                    updateBalanceDisplay();
                }
            } catch(error) {
                // First time user - give 10 ETB starting balance
                balance = 10;
                firstName = 'Player';
                updateBalanceDisplay();
                // Register new user with 10 ETB
                await fetch(`${BACKEND_URL}/api/game`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        telegramId: telegramId,
                        action: 'updateBalance',
                        data: { balance: 10, betAmount: 0 }
                    })
                });
            }
        }
        
        async function updateBalanceOnServer(newBalance, betAmount = 0) {
            try {
                await fetch(`${BACKEND_URL}/api/game`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        telegramId: telegramId,
                        action: 'updateBalance',
                        data: { balance: newBalance, betAmount: betAmount }
                    })
                });
            } catch(error) {
                console.error('Failed to update balance:', error);
            }
        }
        
        async function recordWin(winAmount, newBalance) {
            try {
                await fetch(`${BACKEND_URL}/api/game`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        telegramId: telegramId,
                        action: 'recordWin',
                        data: { winAmount: winAmount, newBalance: newBalance }
                    })
                });
            } catch(error) {
                console.error('Failed to record win:', error);
            }
        }

        function updateBalanceDisplay() {
            document.getElementById('balance').textContent = `${balance.toFixed(2)} ETB`;
            document.getElementById('cardCount').textContent = myCards.length;
            document.getElementById('myCardsCount').textContent = myCards.length;
        }
        
        function deductBalance(amount) {
            if (balance >= amount) {
                balance -= amount;
                updateBalanceDisplay();
                updateBalanceOnServer(balance, amount);
                return true;
            }
            return false;
        }
        
        function addBalance(amount) {
            balance += amount;
            updateBalanceDisplay();
            updateBalanceOnServer(balance);
        }

        // ============================================
        // CARD GENERATION
        // ============================================
        
        function generateAllCards() {
            for (let i = 1; i <= 500; i++) {
                allCards.push({ id: i, grid: generateGrid() });
            }
        }
        
        function generateGrid() {
            const grid = [[], [], [], [], []];
            for (let col = 0; col < 5; col++) {
                const start = col * 15 + 1;
                const end = start + 14;
                let numbers = [];
                for (let n = start; n <= end; n++) numbers.push(n);
                for (let i = numbers.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [numbers[i], numbers[j]] = [numbers[j], numbers[i]];
                }
                for (let row = 0; row < 5; row++) {
                    if (row === 2 && col === 2) grid[row][col] = 0;
                    else grid[row][col] = numbers[row];
                }
            }
            return grid;
        }

        // ============================================
        // CARD SELECTION UI
        // ============================================
        
        function buildCardsGrid() {
            const container = document.getElementById('cardsGrid');
            container.innerHTML = '';
            for (let i = 1; i <= 500; i++) {
                const btn = document.createElement('button');
                btn.className = 'card-btn';
                btn.textContent = i;
                if (myCards.some(c => c.id === i)) btn.classList.add('owned');
                btn.onclick = () => autoBuyCard(i);
                container.appendChild(btn);
            }
        }
        
        async function autoBuyCard(cardId) {
            if (isProcessingBuy) return;
            if (myCards.some(c => c.id === cardId)) {
                showPopup('❌ You already own this card!');
                return;
            }
            if (myCards.length >= 2) {
                showPopup('⚠️ Maximum 2 cards per player!');
                return;
            }
            if (!deductBalance(10)) {
                showPopup('❌ Insufficient balance! Use /deposit');
                return;
            }
            
            isProcessingBuy = true;
            const card = allCards.find(c => c.id === cardId);
            myCards.push(card);
            
            const allBtns = document.querySelectorAll('.card-btn');
            for (let b of allBtns) {
                if (parseInt(b.textContent) === cardId) {
                    b.classList.add('owned');
                    break;
                }
            }
            
            updateBalanceDisplay();
            displayMyCards();
            document.getElementById('myCardsSection').classList.remove('hidden');
            showPopup(`✅ Card ${card.id} purchased! Balance: ${balance.toFixed(2)} ETB`);
            
            if (myCards.length === 1) startCountdown();
            isProcessingBuy = false;
        }
        
        function displayMyCards() {
            const container = document.getElementById('myCardsList');
            container.innerHTML = '';
            myCards.forEach(card => {
                const div = document.createElement('div');
                div.className = 'player-card';
                let gridHtml = '<div class="player-card-grid">';
                for (let row = 0; row < 5; row++) {
                    for (let col = 0; col < 5; col++) {
                        const val = card.grid[row][col];
                        gridHtml += `<div class="player-cell ${val === 0 ? 'free' : ''}">${val === 0 ? '⭐' : val}</div>`;
                    }
                }
                gridHtml += '</div>';
                div.innerHTML = `<div style="margin-bottom:3px; font-size:8px;">Board #${card.id}</div>${gridHtml}`;
                container.appendChild(div);
            });
        }

        // ============================================
        // GAME COUNTDOWN
        // ============================================
        
        function startCountdown() {
            if (myCards.length === 0) return;
            countdown = 30;
            const cdDiv = document.getElementById('countdownSection');
            const cdEl = document.getElementById('countdownTimer');
            cdDiv.classList.remove('hidden');
            if (countdownInterval) clearInterval(countdownInterval);
            countdownInterval = setInterval(() => {
                countdown--;
                cdEl.textContent = countdown;
                if (countdown <= 0) {
                    clearInterval(countdownInterval);
                    cdDiv.classList.add('hidden');
                    startGame();
                }
            }, 1000);
        }

        // ============================================
        // GAME START & NUMBER CALLING
        // ============================================
        
        function startGame() {
            if (myCards.length === 0) return;
            gameActive = true;
            calledNumbers = [];
            document.getElementById('lobbyView').classList.add('hidden');
            document.getElementById('gameView').classList.remove('hidden');
            buildMasterGrid();
            displayPlayingCards();
            startCalling();
            showPopup('🎮 Game Started! Click BINGO to win!');
        }
        
        function buildMasterGrid() {
            const grid = document.getElementById('masterGrid');
            grid.innerHTML = '';
            for (let row = 1; row <= 15; row++) {
                const masterRow = document.createElement('div');
                masterRow.className = 'master-row';
                let num = row;
                for (let col = 0; col < 5; col++) {
                    const cell = document.createElement('div');
                    cell.className = 'master-cell';
                    cell.id = `cell-${num}`;
                    cell.textContent = num;
                    masterRow.appendChild(cell);
                    num += 15;
                }
                grid.appendChild(masterRow);
            }
        }
        
        function displayPlayingCards() {
            const container = document.getElementById('playerCardsContainer');
            container.innerHTML = '';
            myCards.forEach(card => {
                const div = document.createElement('div');
                div.className = 'player-card';
                let gridHtml = '<div class="player-card-grid">';
                for (let row = 0; row < 5; row++) {
                    for (let col = 0; col < 5; col++) {
                        const val = card.grid[row][col];
                        gridHtml += `<div id="pc-${card.id}-${row}-${col}" class="player-cell ${val === 0 ? 'free' : ''}">${val === 0 ? '⭐' : val}</div>`;
                    }
                }
                gridHtml += '</div>';
                div.innerHTML = `<div style="margin-bottom:3px; font-size:8px;">#${card.id}</div>${gridHtml}`;
                container.appendChild(div);
            });
        }
        
        function startCalling() {
            let available = [];
            for (let i = 1; i <= 75; i++) available.push(i);
            if (callInterval) clearInterval(callInterval);
            callInterval = setInterval(() => {
                if (!gameActive) return;
                if (available.length === 0) { endGame(); return; }
                const idx = Math.floor(Math.random() * available.length);
                const num = available.splice(idx, 1)[0];
                callNumber(num);
            }, 3000);
        }
        
        function callNumber(num) {
            calledNumbers.push(num);
            let letter = '';
            if (num < 16) letter = 'B';
            else if (num < 31) letter = 'I';
            else if (num < 46) letter = 'N';
            else if (num < 61) letter = 'G';
            else letter = 'O';
            
            document.getElementById('currentCall').textContent = `${letter}-${num}`;
            
            const history = document.getElementById('historyCalls');
            const lastThree = calledNumbers.slice(-3);
            history.innerHTML = '';
            lastThree.forEach(n => {
                let l = '';
                if (n < 16) l = 'B';
                else if (n < 31) l = 'I';
                else if (n < 46) l = 'N';
                else if (n < 61) l = 'G';
                else l = 'O';
                const ball = document.createElement('div');
                ball.className = `history-ball ball-${l.toLowerCase()}`;
                ball.textContent = `${l}-${n}`;
                history.appendChild(ball);
            });
            
            const masterCell = document.getElementById(`cell-${num}`);
            if (masterCell) masterCell.classList.add('called');
            
            myCards.forEach(card => {
                for (let row = 0; row < 5; row++) {
                    for (let col = 0; col < 5; col++) {
                        if (card.grid[row][col] === num) {
                            const cell = document.getElementById(`pc-${card.id}-${row}-${col}`);
                            if (cell) cell.classList.add('marked');
                        }
                    }
                }
            });
        }

        // ============================================
        // WINNING PATTERN DETECTION
        // ============================================
        
        function hasWinningPattern(card) {
            const grid = card.grid;
            for (let row = 0; row < 5; row++) {
                let complete = true;
                for (let col = 0; col < 5; col++) {
                    const val = grid[row][col];
                    if (val !== 0 && !calledNumbers.includes(val)) { complete = false; break; }
                }
                if (complete) return true;
            }
            for (let col = 0; col < 5; col++) {
                let complete = true;
                for (let row = 0; row < 5; row++) {
                    const val = grid[row][col];
                    if (val !== 0 && !calledNumbers.includes(val)) { complete = false; break; }
                }
                if (complete) return true;
            }
            let diag1 = true, diag2 = true;
            for (let i = 0; i < 5; i++) {
                if (grid[i][i] !== 0 && !calledNumbers.includes(grid[i][i])) diag1 = false;
                if (grid[i][4-i] !== 0 && !calledNumbers.includes(grid[i][4-i])) diag2 = false;
            }
            if (diag1 || diag2) return true;
            return false;
        }
        
        function claimBingo() {
            if (!gameActive) { showPopup('Game not active!'); return; }
            if (calledNumbers.length < 4) { showPopup('⚠️ Wait for 4 numbers!'); return; }
            for (const card of myCards) {
                if (hasWinningPattern(card)) {
                    declareWinner(card);
                    return;
                }
            }
            showPopup('❌ No winning pattern! Keep playing.');
        }
        
        function declareWinner(card) {
            gameActive = false;
            clearInterval(callInterval);
            const winAmount = 500;
            addBalance(winAmount);
            recordWin(winAmount, balance);
            document.getElementById('winnerMessage').innerHTML = `🎉 YOU WON! 🎉<br>Prize: ${winAmount} ETB<br>New Balance: ${balance.toFixed(2)} ETB`;
            document.getElementById('winnerModal').style.display = 'flex';
            if (typeof confetti === 'function') confetti({ particleCount: 100, spread: 60 });
        }
        
        function resetGame() {
            gameActive = false;
            clearInterval(callInterval);
            calledNumbers = [];
            document.getElementById('gameView').classList.add('hidden');
            document.getElementById('lobbyView').classList.remove('hidden');
            document.getElementById('countdownSection').classList.add('hidden');
            if (countdownInterval) clearInterval(countdownInterval);
            if (myCards.length > 0) {
                displayMyCards();
                document.getElementById('myCardsSection').classList.remove('hidden');
            }
            buildCardsGrid();
        }
        
        function resetAllCards() {
            if (myCards.length === 0) return;
            const refund = myCards.length * 10;
            balance += refund;
            myCards = [];
            updateBalanceDisplay();
            updateBalanceOnServer(balance);
            buildCardsGrid();
            document.getElementById('myCardsSection').classList.add('hidden');
            document.getElementById('myCardsList').innerHTML = '';
            document.getElementById('countdownSection').classList.add('hidden');
            if (countdownInterval) clearInterval(countdownInterval);
            if (callInterval) clearInterval(callInterval);
            gameActive = false;
            showPopup(`🔄 Reset! Refunded ${refund} ETB.`);
        }
        
        function showPopup(msg) {
            const popup = document.getElementById('popup');
            popup.textContent = msg;
            popup.style.display = 'block';
            setTimeout(() => popup.style.display = 'none', 2000);
        }
        
        document.getElementById('resetBtn').onclick = resetAllCards;
        document.getElementById('bingoBtn').onclick = claimBingo;
        document.getElementById('closeModalBtn').onclick = () => {
            document.getElementById('winnerModal').style.display = 'none';
            resetGame();
        };
        
        generateAllCards();
        buildCardsGrid();
        loadUserData().then(() => {
            updateBalanceDisplay();
            if (myCards.length > 0) {
                displayMyCards();
                document.getElementById('myCardsSection').classList.remove('hidden');
            }
            showPopup(`🎯 Welcome! Tap any card to buy (10 ETB each, max 2)`);
        });
        
        if (tg) {
            tg.MainButton.setText("BUY CARDS");
            tg.MainButton.show();
        }
    </script>
</body>
</html>
